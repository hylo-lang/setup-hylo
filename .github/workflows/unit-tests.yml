name: Unit tests

on:
  push:
  pull_request:

jobs:
  unit_tests:
    name: '${{ matrix.os }}: unit tests'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version: '20.x'
    - run: npm install
    - run: npm run build
    - run: npx jest
