# SPDX short identifier: MIT

name: 'setup-hylo'
description: 'Installs the Hylo toolchain at an explicit release tag and exposes the `hc` compiler on PATH.'
author: 'Ambrus Tóth'
runs:
  using: 'node24'
  main: 'dist/index.js'

inputs:
  version:
    required: true
    description: "Hylo toolchain release tag to install (e.g. 'v0.0.1'). An explicit tag is required; 'latest' is not supported."
  useCloudCache:
    required: false
    description: "If true, use the GitHub Actions cloud cache to speed up subsequent runs."
    default: "true"

outputs:
  hyloToolchainRootDirectory:
    description: "The root directory of the installed Hylo toolchain (contains the `hc` binary)."
branding:
  icon: 'terminal'  
  color: 'green'
